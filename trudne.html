<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Cz ty?</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        overflow: hidden;
        color: white;
    }

    .container {
        text-align: center;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 30px;
    }

    button {
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    #tak {
        padding: 20px 40px;
        font-size: 18px;
        background: #4CAF50;
        color: white;
        display: block;
        margin: 0 auto 15px auto;
    }

    #nie {
        padding: 40px 80px;
        font-size: 22px;
        background: #ff4d4d;
        color: white;
        display: block;
        margin: 0 auto;
    }

    #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        color: white;
        display: none;
        justify-content: center;
        align-items: center;
        font-size: 60px;
        z-index: 999;
    }

    #result {
        font-size: 60px;
        display: none;
    }
</style>
</head>
<body>

<div class="container">
    <h1 id="question">Czy jesteś dla mnie najważniejszą osobą na świecie?</h1>
    <button id="tak">Tak</button>
    <button id="nie">Nie</button>
</div>

<div id="overlay">nie wygłupiaj się</div>
<div id="result">ZGADŁAŚ</div>

<script>
let nieClickCount = 0;
const nieBtn = document.getElementById("nie");
const overlay = document.getElementById("overlay");

function moveNie() {
    const btnWidth = nieBtn.offsetWidth;
    const btnHeight = nieBtn.offsetHeight;

    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    const rangeX = 300;
    const rangeY = 200;

    const minX = centerX - rangeX;
    const maxX = centerX + rangeX - btnWidth;

    const minY = centerY - rangeY;
    const maxY = centerY + rangeY - btnHeight;

    const x = Math.max(0, Math.min(window.innerWidth - btnWidth, Math.random() * (maxX - minX) + minX));
    const y = Math.max(0, Math.min(window.innerHeight - btnHeight, Math.random() * (maxY - minY) + minY));

    nieBtn.style.position = "fixed";
    nieBtn.style.left = x + "px";
    nieBtn.style.top = y + "px";
}

nieBtn.addEventListener("click", () => {
    nieClickCount++;

    if (nieClickCount === 1) {
        // dopiero po pierwszym kliknięciu zmieniamy na absolute/fixed
        nieBtn.style.position = "fixed";
    }

    if (nieClickCount < 6) {
        moveNie();
    } else {
        overlay.style.display = "flex";

        setTimeout(() => {
            overlay.style.display = "none";
        }, 3000);
    }
});

document.getElementById("tak").addEventListener("click", () => {
    document.querySelector(".container").style.display = "none";
    document.getElementById("result").style.display = "block";
});
</script>

</body>
</html>
