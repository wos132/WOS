<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W_OS</title>

<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        text-align: center;
    }

    .loader {
        width: 60px;
        height: 60px;
        border: 6px solid rgba(255,255,255,0.2);
        border-top: 6px solid #00ccff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 20px auto;
    }

    @keyframes spin {
        100% {
            transform: rotate(360deg);
        }
    }

    .dots::after {
        content: "";
        animation: dots 1.5s infinite;
    }

    @keyframes dots {
        0% { content: ""; }
        33% { content: "."; }
        66% { content: ".."; }
        100% { content: "..."; }
    }
</style>

<script>
    setTimeout(function () {
        window.location.href = "https://mega.nz/folder/vANTmBSC#WlcAXHON9RmAr0Vy12LJng";
    }, 5000);
</script>

</head>
<body>

<div class="container">
    <h1>Łączenie z serwerem W_OS<span class="dots"></span></h1>
    <div class="loader"></div>
    <p>Trwa nawiązywanie połączenia...</p>
</div>

</body>
</html>
